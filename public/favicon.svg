<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Premium Aurora Accent Gradient -->
    <linearGradient id="aurora-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Chat Bubbles Overlay Soft Glow -->
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Smooth Card Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Ambient Glow effect behind logo -->
  <circle cx="256" cy="230" r="140" fill="url(#aurora-grad)" opacity="0.15" filter="url(#soft-glow)" />

  <g transform="translate(4, -10)">
    <!-- Back Chat Bubble (Darker / Secondary) -->
    <path d="M 190,290 
             C 190,340 230,370 290,370 
             C 310,370 330,365 345,355 
             L 390,370 
             L 380,330 
             C 395,310 400,290 400,270 
             C 400,210 350,170 290,170 
             C 230,170 190,210 190,270 Z" 
          fill="#1e293b" 
          stroke="#334155" 
          stroke-width="6" 
          stroke-linejoin="round" />

    <!-- Front Chat Bubble (Vibrant Gradient Primary) -->
    <path d="M 120,230 
             C 120,290 170,330 230,330 
             C 250,330 270,325 285,315 
             L 330,330 
             L 320,290 
             C 335,270 340,250 340,230 
             C 340,170 290,130 230,130 
             C 170,130 120,170 120,230 Z" 
          fill="url(#aurora-grad)" 
          filter="url(#soft-glow)" />

    <!-- Inner Ribbon wrap accent inside primary bubble (symbolizes the "Wrapped" connection) -->
    <path d="M 180,210 
             Q 220,180 250,220 
             T 290,230" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="8" 
          stroke-linecap="round" 
          opacity="0.9" />

    <!-- Sparkles on the top right representing the magic stats unwrap -->
    <path d="M 330,120 L 335,100 L 340,120 L 360,125 L 340,130 L 335,150 L 330,130 L 310,125 Z" fill="#22d3ee" />
    <path d="M 140,320 L 143,305 L 146,320 L 161,323 L 146,326 L 143,341 L 140,326 L 125,323 Z" fill="#818cf8" opacity="0.8" />
  </g>
</svg>